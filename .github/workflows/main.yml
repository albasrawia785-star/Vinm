name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pre-Clean Conflicting Configurations
        run: |
          # حذف أي ملفات إعدادات قديمة مسبقاً لمنع خطأ الـ init نهائياً
          rm -rf capacitor.config.ts capacitor.config.json

      - name: Unzip Project Files
        run: |
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -r $TARGET_DIR/* .
          else
            echo "Error: package.json not found!"
            exit 1
          fi
          rm -rf temp_unzip

      - name: Deep Clean Environment
        run: |
          # تنظيف شامل للمجلدات والملفات المتعارضة حتى داخل المجلدات الفرعية
          rm -rf node_modules package-lock.json dist android
          find . -name "capacitor.config.ts" -delete
          find . -name "capacitor.config.json" -delete

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --force

      - name: Build Web Application
        run: npm run build

      - name: Install Capacitor CLI, Core, Filesystem & Share
        run: |
          # تثبيت كاباسيتور مع إضافات المشاركة وإدارة الملفات المطلوبة للنسخة الاحتياطية
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/filesystem@latest @capacitor/share@latest

      - name: Initialize Capacitor Android
        run: |
          # تهيئة نظيفة تضمن ربط الإضافات الجديدة ومزامنتها
          npx cap init "Saydali Pro POS" "com.saydalipro.pos" --web-dir=dist
          npx cap add android
          npx cap sync android

      - name: Inject Camera & Storage Permissions into AndroidManifest
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Injecting Camera & Storage permissions..."
            # حقن صلاحيات الكاميرا، القراءة، والكتابة في الذاكرة الخارجية
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />' $MANIFEST_PATH
          fi

      - name: Update Kotlin & Gradle Versions for Java 21
        run: |
          cd android
          if [ -f "build.gradle" ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' build.gradle
            sed -i 's/kotlin_version = .*/kotlin_version = "1.9.24"/g' build.gradle
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.android.useAndroidX=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
