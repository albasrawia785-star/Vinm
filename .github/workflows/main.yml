name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pre-Clean Conflicting Configurations
        run: |
          # حذف أي ملفات إعدادات قديمة مسبقاً لمنع خطأ الـ init نهائياً
          rm -rf capacitor.config.ts capacitor.config.json

      - name: Unzip Project Files
        run: |
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -r $TARGET_DIR/* .
          else
            echo "Error: package.json not found!"
            exit 1
          fi
          rm -rf temp_unzip

      - name: Auto-Patch React Code for Capacitor Share & Filesystem
        run: |
          echo "البحث عن ملفات الـ React التي تحتوي على دالة النسخ الاحتياطي وحقن كود المشاركة..."
          
          # 1. البحث عن الملف الذي يحتوي على نص رسالة النجاح التي ظهرت في الفيديو أو دالة التصدير
          # مثل "تم تصدير النسخة الاحتياطية" أو "تصدير ومشاركة"
          TARGET_FILE=$(grep -rlw "تم تصدير" src/ || grep -rlw "تصدير ومشاركة" src/ || grep -rlw "download" src/ | grep -E "\.(js|jsx|ts|tsx)$" | head -n 1)
          
          if [ -n "$TARGET_FILE" ]; then
            echo "تم العثور على ملف الواجهة المستهدف: $TARGET_FILE"
            
            # 2. حقن مكاتب الاستيراد الخاصة بكاباسيتور في أعلى الملف المستهدف
            # سنضيف الاستيراد في السطر الأول للملف
            sed -i '1s|^|import { Filesystem, Directory } from "@capacitor/filesystem";\nimport { Share } from "@capacitor/share";\nimport { Capacitor } from "@capacitor/core";\n|' "$TARGET_FILE"
            
            # 3. صياغة دالة تحويل ومشاركة متطورة ومتوافقة برمجياً مع الأندرويد والويب
            # سنقوم بحقن دالة مساعدة لتحويل الـ Blob أو رابط التحميل إلى Base64 ومشاركته
            cat << 'EOF' >> "$TARGET_FILE"

            // دالة مضافة تلقائياً بواسطة الـ Build Pipeline لتسهيل المشاركة على الأندرويد
            window.handleCapacitorShare = async (blobOrUrl, fallbackFileName) => {
              try {
                const fileName = fallbackFileName || `Saydali_Pro_Backup_${Date.now()}.zip`;
                
                // تحويل الرابط أو الـ Blob إلى Base64
                let base64Data = "";
                if (typeof blobOrUrl === 'string' && blobOrUrl.startsWith('data:')) {
                  base64Data = blobOrUrl.split(',')[1];
                } else {
                  const response = await fetch(blobOrUrl);
                  const blob = await response.blob();
                  base64Data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                  });
                }

                if (Capacitor.isNativePlatform()) {
                  await Filesystem.requestPermissions();
                  const tempFile = await Filesystem.writeFile({
                    path: fileName,
                    data: base64Data,
                    directory: Directory.Cache
                  });

                  const canShare = await Share.canShare();
                  if (canShare.value) {
                    await Share.share({
                      title: 'نسخة احتياطية - صيدلي برو',
                      text: 'ملف النسخة الاحتياطية لقاعدة البيانات.',
                      url: tempFile.uri,
                      dialogTitle: 'تصدير ومشاركة النسخة الاحتياطية'
                    });
                  } else {
                    await Filesystem.writeFile({
                      path: fileName,
                      data: base64Data,
                      directory: Directory.Documents
                    });
                    alert('تم حفظ الملف في مجلد المستندات Documents بنجاح!');
                  }
                } else {
                  const link = document.createElement('a');
                  link.href = `data:application/zip;base64,${base64Data}`;
                  link.download = fileName;
                  document.body.appendChild(link);
                  link.click();
                  document.body.removeChild(link);
                }
              } catch (e) {
                console.error("فشلت عملية المشاركة البرمجية:", e);
              }
            };
            EOF

            # 4. استبدال طريقة التحميل التقليدية (click) باستدعاء الدالة الجديدة التي أنشأناها بالخلفية
            # هذا التعديل يستهدف السطور التي تقوم بـ click() على روابط التحميل ويجعلها تمر عبر دالتنا الذكية
            sed -i 's/\([a-zA-Z0-9_]*\)\.click()/if (window.handleCapacitorShare) { window.handleCapacitorShare(\1.href || \1, "Saydali_Pro_Backup.zip"); } else { \0 }/g' "$TARGET_FILE"
            
            echo "تمت عملية حقن الكود وتحديث الملف بنجاح!"
          else
            echo "تنبيه: لم يتم العثور على ملف يحتوي على نصوص التصدير لتعديله تلقائياً."
          fi

      - name: Deep Clean Environment
        run: |
          # تنظيف شامل للمجلدات والملفات المتعارضة حتى داخل المجلدات الفرعية
          rm -rf node_modules package-lock.json dist android
          find . -name "capacitor.config.ts" -delete
          find . -name "capacitor.config.json" -delete

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --force

      - name: Build Web Application
        run: npm run build

      - name: Install Capacitor CLI, Core, Filesystem & Share
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/filesystem@latest @capacitor/share@latest

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Saydali Pro POS" "com.saydalipro.pos" --web-dir=dist
          npx cap add android
          npx cap sync android

      - name: Configure FileProvider for Sharing and Backup
        run: |
          # 1. إنشاء مجلد xml الخاص بالصلاحيات إذا لم يكن موجوداً
          mkdir -p android/app/src/main/res/xml
          
          # 2. إنشاء ملف file_paths.xml لكي يسمح للأندرويد بمشاركة الملفات من الكاش والمستندات
          cat << 'EOF' > android/app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="."/>
              <cache-path name="cache_files" path="."/>
              <files-path name="files" path="."/>
          </paths>
          EOF

          # 3. حقن الـ FileProvider والصلاحيات داخل الـ AndroidManifest.xml
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Configuring AndroidManifest with permissions and FileProvider..."
            
            # حقن صلاحيات الكاميرا والتخزين
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />' $MANIFEST_PATH
            
            # حقن الـ FileProvider داخل وسم <application> لتمكين المشاركة الفورية للملفات
            PROVIDER_TAG='<provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths" /></provider>'
            sed -i "s|</application>|    $PROVIDER_TAG\n    </application>|" $MANIFEST_PATH
          fi

      - name: Update Kotlin & Gradle Versions for Java 21
        run: |
          cd android
          if [ -f "build.gradle" ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' build.gradle
            sed -i 's/kotlin_version = .*/kotlin_version = "1.9.24"/g' build.gradle
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.android.useAndroidX=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          overwrite: true
